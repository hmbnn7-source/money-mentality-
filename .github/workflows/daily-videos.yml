name: Daily YouTube Videos

on:
  schedule:
    - cron: '0 0 * * *'   # 3:00 صباحاً السعودية
    - cron: '0 1 * * *'   # 4:00 صباحاً
    - cron: '0 2 * * *'   # 5:00 صباحاً
    - cron: '0 3 * * *'   # 6:00 صباحاً
    - cron: '0 4 * * *'   # 7:00 صباحاً
  workflow_dispatch:

jobs:
  generate-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      - name: Upgrade pip and tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Try installing moviepy with verbose
        run: |
          echo "Attempting to install moviepy..."
          python -m pip install --verbose moviepy imageio-ffmpeg || echo "moviepy installation failed"
          python -m pip list | grep moviepy || echo "moviepy not in list"

      - name: Install other dependencies
        run: |
          python -m pip install openai pexels-api gtts google-auth google-auth-oauthlib google-api-python-client requests

      - name: Verify moviepy installation
        run: |
          python -c "import moviepy.editor; print('moviepy installed successfully')" || { echo 'moviepy not installed'; exit 1; }

      - name: Decode secrets
        env:
          CLIENT_SECRETS_B64: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_B64: ${{ secrets.TOKEN_JSON }}
        run: |
          echo "$CLIENT_SECRETS_B64" | base64 --decode > client_secrets.json
          echo "$TOKEN_B64" | base64 --decode > token.json

      - name: Run generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/run_batch.py

      - name: Upload logs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: /tmp/video_*.mp4
          retention-days: 1
