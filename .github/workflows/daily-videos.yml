name: Daily YouTube Videos

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  generate-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      - name: Show Python and pip info
        run: |
          which python
          python --version
          which pip
          pip --version
          pip list

      - name: Install Python dependencies (verbose)
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --verbose moviepy imageio-ffmpeg
          pip install --verbose openai pexels-api gtts google-auth google-auth-oauthlib google-api-python-client requests
          pip list | grep moviepy

      - name: Decode secrets
        env:
          CLIENT_SECRETS_B64: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_B64: ${{ secrets.TOKEN_JSON }}
        run: |
          echo "$CLIENT_SECRETS_B64" | base64 --decode > client_secrets.json
          echo "$TOKEN_B64" | base64 --decode > token.json

      - name: Test import moviepy
        run: python -c "import moviepy.editor; print('moviepy imported successfully')"

      - name: Run generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/run_batch.py

      - name: Upload logs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: /tmp/video_*.mp4
          retention-days: 1
