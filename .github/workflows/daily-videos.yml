name: Daily YouTube Videos

on:
  schedule:
    - cron: '0 10 * * *'   # 13:00 بتوقيت السعودية
  workflow_dispatch:

jobs:
  generate-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decode secrets
        env:
          CLIENT_SECRETS_B64: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_B64: ${{ secrets.TOKEN_JSON }}
        run: |
          echo "$CLIENT_SECRETS_B64" | base64 --decode > client_secrets.json
          echo "$TOKEN_B64" | base64 --decode > token.json

      - name: Run generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          VOICE_ID: ${{ secrets.VOICE_ID }}  # اختياري، يمكنك تعيين قيمة افتراضية في الكود
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
        run: python scripts/run_batch.py
        
      - name: Upload logs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: /tmp/video_*.mp4
          retention-days: 1

      - name: Test decode secrets
        run: |
          echo "Testing CLIENT_SECRETS_JSON length: ${#CLIENT_SECRETS_B64}"
          echo "$CLIENT_SECRETS_B64" | head -c 50
          echo "$CLIENT_SECRETS_B64" | base64 --decode 2>&1 | head -c 100 || true
